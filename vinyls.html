<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>vinyls — pisanvs</title>
  <style>
    @font-face {
      font-family: 'RobotoMono';
      src: url('./assets/fonts/RobotoMono-VariableFont_wght.ttf') format('truetype-variations');
      font-weight: 100 700;
    }
    :root {
      --bg:         #0a0a0a;
      --fg:         #d4d4d4;
      --green:      #39ff14;
      --green-dim:  #1a8c00;
      --cyan:       #00e5ff;
      --muted:      #555;
      --yellow:     #ffd700;
      --orange:     #ff8c00;
      --pink:       #f472b6;
      --purple:     #c084fc;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'RobotoMono', monospace;
      font-size: 13px;
      line-height: 1.6;
      padding: 48px 24px 80px;
      min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; }
    a:hover { color: var(--cyan); }

    #header {
      max-width: 760px;
      margin: 0 auto 16px;
      display: flex;
      align-items: baseline;
      gap: 24px;
    }
    #header h1 { color: var(--pink); font-size: 15px; font-weight: 600; }
    #header .back { color: var(--muted); font-size: 12px; }
    #header .back:hover { color: var(--cyan); }
    #stats { color: var(--muted); font-size: 12px; margin-left: auto; }

    #nav {
      max-width: 760px;
      margin: 0 auto 28px;
      display: flex;
      gap: 8px;
    }
    .nav-chip {
      display: inline-block;
      background: transparent;
      border: 1px solid;
      font-family: 'RobotoMono', monospace;
      font-size: 12px;
      padding: 2px 10px;
      cursor: pointer;
      border-radius: 2px;
      text-decoration: none;
      transition: background 0.15s, color 0.15s;
    }
    .nav-chip.books {
      color: var(--muted);
      border-color: var(--muted);
    }
    .nav-chip.books:hover { color: var(--green); border-color: var(--green); background: rgba(57,255,20,.06); }
    .nav-chip.vinyls {
      color: var(--pink);
      border-color: var(--pink);
      background: rgba(244,114,182,.08);
    }
    .nav-chip.vinyls:hover { background: rgba(244,114,182,.16); }

    .tree {
      max-width: 760px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .group-label {
      margin-top: 24px;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .group-label .icon  { color: var(--muted); }
    .group-label .name  { font-weight: 600; color: var(--pink); }
    .group-label .count { color: var(--muted); font-size: 11px; }

    .vinyl-line {
      display: flex;
      align-items: baseline;
      gap: 0;
      padding: 1px 0;
      padding-left: 4px;
    }
    .tree-branch  { color: var(--muted); white-space: pre; flex-shrink: 0; }
    .vinyl-title  { color: var(--fg); }
    .vinyl-artist { color: var(--muted); }
    .vinyl-year   { color: var(--muted); font-size: 11px; margin-left: 8px; flex-shrink: 0; }
    .vinyl-genre  { color: var(--purple); font-size: 11px; margin-left: 6px; flex-shrink: 0; opacity: 0.7; }

    .wantlist-line { display: flex; align-items: baseline; gap: 0; padding: 1px 0; padding-left: 4px; }
    .want-branch  { color: var(--green-dim); white-space: pre; flex-shrink: 0; }
    .want-title   { color: var(--fg); }
    .want-artist  { color: var(--muted); }
    .want-year    { color: var(--muted); font-size: 11px; margin-left: 8px; flex-shrink: 0; }

    .section-gap { margin-top: 36px; }

    #loading { color: var(--muted); }

    canvas#crt-bg {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0; opacity: .25;
    }
    #header { position: relative; z-index: 1; }
    #nav    { position: relative; z-index: 1; }
  </style>
</head>
<body>
  <canvas id="crt-bg"></canvas>

  <div id="header">
    <h1>tree ~/vinyls</h1>
    <a class="back" href="/">← back</a>
    <span id="stats"></span>
  </div>

  <div id="nav">
    <a class="nav-chip books" href="/books.html">📚 my books</a>
    <a class="nav-chip vinyls" href="/vinyls.html">🎵 my vinyls</a>
  </div>

  <div class="tree" id="tree">
    <div id="loading">loading…</div>
  </div>

  <script>
  const LIVE_URL = 'https://live.pisanvs.cl';

  function escHtml(s) {
    return String(s).replace(/[&<>"']/g, c =>
      ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function renderTree(vinyls, wantlist) {
    const treeEl  = document.getElementById('tree');
    const statsEl = document.getElementById('stats');

    const totalRecords = (vinyls?.length || 0) + (wantlist?.length || 0);
    statsEl.textContent = `${vinyls?.length || 0} owned · ${wantlist?.length || 0} wanted`;

    const html = [];

    // ── collection ──────────────────────────────────────────────────────
    if (vinyls?.length) {
      html.push(`<div class="group-label">
        <span class="icon">◉</span>
        <span class="name">collection</span>
        <span class="count">(${vinyls.length})</span>
      </div>`);

      vinyls.forEach((v, i) => {
        const last   = i === vinyls.length - 1;
        const branch = last ? '└── ' : '├── ';
        const genre  = v.genres?.[0] || '';
        html.push(`<div class="vinyl-line">
          <span class="tree-branch">${escHtml(branch)}</span>
          <span class="vinyl-title">${escHtml(v.title)}</span>
          <span class="vinyl-artist">&nbsp;—&nbsp;${escHtml(v.artist)}</span>
          ${v.year ? `<span class="vinyl-year">${escHtml(String(v.year))}</span>` : ''}
          ${genre   ? `<span class="vinyl-genre">[${escHtml(genre)}]</span>` : ''}
        </div>`);
      });
    }

    // ── wantlist ────────────────────────────────────────────────────────
    if (wantlist?.length) {
      html.push(`<div class="group-label section-gap" id="wantlist">
        <span class="icon" style="color:var(--green-dim)">+</span>
        <span class="name" style="color:var(--green)">wantlist</span>
        <span class="count">(${wantlist.length})</span>
      </div>`);

      wantlist.forEach((v, i) => {
        const last   = i === wantlist.length - 1;
        const branch = last ? '└── ' : '├── ';
        html.push(`<div class="wantlist-line">
          <span class="want-branch">${escHtml(branch)}</span>
          <span class="want-title">${escHtml(v.title)}</span>
          <span class="want-artist">&nbsp;—&nbsp;${escHtml(v.artist)}</span>
          ${v.year ? `<span class="want-year">${escHtml(String(v.year))}</span>` : ''}
        </div>`);
      });
    }

    treeEl.innerHTML = html.join('');

    // scroll to #wantlist anchor if present
    if (location.hash === '#wantlist') {
      document.getElementById('wantlist')?.scrollIntoView({ behavior: 'smooth' });
    }
  }

  async function load() {
    const res  = await fetch(LIVE_URL);
    const data = await res.json();
    if (data.vinyls?.length || data.wantlist?.length) {
      renderTree(data.vinyls, data.wantlist);
    } else {
      document.getElementById('loading').textContent = 'no vinyls found.';
    }
  }

  load().catch(e => {
    document.getElementById('loading').textContent = 'failed to load: ' + e.message;
  });

  // CRT
  (function() {
    const c = document.getElementById('crt-bg');
    const ctx = c.getContext('2d');
    function resize() { c.width = innerWidth; c.height = innerHeight; }
    resize(); addEventListener('resize', resize);
    let t = 0;
    (function tick() {
      ctx.clearRect(0, 0, c.width, c.height);
      ctx.strokeStyle = 'rgba(0,255,0,.15)';
      ctx.lineWidth = 1;
      const step = 36, off = (t * 0.4) % step;
      for (let y = -step + off; y < c.height; y += step) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(c.width, y); ctx.stroke();
      }
      for (let x = 0; x < c.width; x += step) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, c.height); ctx.stroke();
      }
      t++; requestAnimationFrame(tick);
    })();
  })();
  </script>
</body>
</html>
